<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="./assets/css/style.css" />
        <link rel="icon" href="./assets/image/coffre-fort.png" type="image/png" />
        <title>Convertisseur de devises</title>

        <meta name="description" content="Convertisseur de devises en ligne avec taux de change mis à jour automatiquement (EUR, USD, GBP, JPY, CNY, FRF)." />

        <meta property="og:type" content="website" />
        <meta property="og:title" content="Convertisseur de devises" />
        <meta property="og:description" content="Convertisseur de devises en ligne avec taux de change mis à jour automatiquement." />
        <meta property="og:image" content="https://leven-anju-yuki.github.io/Convertisseur-euro/assets/image/coffre-fort.png" />
        <meta property="og:url" content="https://leven-anju-yuki.github.io/Convertisseur-euro/" />

        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Convertisseur de devises" />
        <meta name="twitter:description" content="Convertisseur de devises en ligne avec taux de change mis à jour automatiquement." />
        <meta name="twitter:image" content="https://leven-anju-yuki.github.io/Convertisseur-euro/assets/image/coffre-fort.png" />
    </head>
    <body>
        <div class="scene">
            <header class="en-tete">
                <div class="coffre-emblème" aria-hidden="true">
                    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                        <circle class="anneau-externe" cx="100" cy="100" r="92" />
                        <circle class="disque-bleu" cx="100" cy="100" r="78" />
                        <g class="rivets">
                            <circle cx="100" cy="32" r="3.2" />
                            <circle cx="100" cy="168" r="3.2" />
                            <circle cx="32" cy="100" r="3.2" />
                            <circle cx="168" cy="100" r="3.2" />
                            <circle cx="52.7" cy="52.7" r="2.6" />
                            <circle cx="147.3" cy="52.7" r="2.6" />
                            <circle cx="52.7" cy="147.3" r="2.6" />
                            <circle cx="147.3" cy="147.3" r="2.6" />
                        </g>
                        <g class="roue-combinaison">
                            <circle class="disque-prune" cx="100" cy="100" r="46" />
                            <g class="rayons">
                                <line x1="100" y1="66" x2="100" y2="76" />
                                <line x1="100" y1="124" x2="100" y2="134" />
                                <line x1="66" y1="100" x2="76" y2="100" />
                                <line x1="124" y1="100" x2="134" y2="100" />
                                <line x1="76.7" y1="76.7" x2="83.6" y2="83.6" />
                                <line x1="116.4" y1="116.4" x2="123.3" y2="123.3" />
                                <line x1="76.7" y1="123.3" x2="83.6" y2="116.4" />
                                <line x1="116.4" y1="83.6" x2="123.3" y2="76.7" />
                            </g>
                        </g>
                        <circle class="moyeu" cx="100" cy="100" r="22" />
                        <rect class="cadenas-corps" x="93" y="92" width="14" height="11" rx="2" />
                        <path class="cadenas-anse" d="M 96 92 L 96 87 A 4 4 0 0 1 104 87 L 104 92" />
                    </svg>
                </div>
                <h1>Convertisseur de devises</h1>
                <p class="sous-titre">Taux de change actualisés en continu</p>
            </header>

            <main class="carnet">
                <div class="champ">
                    <label for="montant">Montant</label>
                    <input type="number" id="montant" placeholder="0,00" step="0.01" />
                </div>
                <div class="champ">
                    <label for="devises">Devise de départ</label>
                    <select id="devises">
                        <option value="EUR">Euro (EUR)</option>
                        <option value="USD">Dollar américain (USD)</option>
                        <option value="GBP">Livre sterling (GBP)</option>
                        <option value="FRF">Franc français (FRF)</option>
                        <option value="JPY">Yen japonais (JPY)</option>
                        <option value="CNY">Yuan chinois (CNY)</option>
                    </select>
                </div>
                <div id="output"></div>
            </main>

            <footer class="pied">
                <p>Source des taux : Banque centrale européenne, via Frankfurter API</p>
            </footer>
        </div>
        <script src="./assets/js/script.js"></script>
    </body>
</html>
